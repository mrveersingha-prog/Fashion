<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abhi Fashion</title>

<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 10px;
}

.hero {
    text-align: center;
    padding: 30px 10px;
    background: white;
}

.hero h2 {
    font-size: 28px;
}

#search {
    padding: 12px;
    width: 80%;
    max-width: 400px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 25px;
}

.card {
    background: white;
    width: 220px;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 2px 10px #ccc;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
}

button {
    background: black;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.contact {
    background: white;
    text-align: center;
    padding: 30px;
}

footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <h1>Abhi Fashion</h1>

    <nav>
        <a href="#home">Home</a>
        <a href="#men">Men</a>
        <a href="#women">Women</a>
        <a href="#shoes">Shoes</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">
    <h2>Welcome to Abhi Fashion</h2>

    <input 
        type="text" 
        id="search" 
        placeholder="Search products..."
        onkeyup="searchProducts()"
    >
</section>

<section class="products" id="products">

    <div class="card" id="men">
        <img src="black-t-shirt.jpg" alt="Black T-Shirt">

        <h3>Black T-Shirt</h3>
        <p>₹499</p>

        <button onclick="orderProduct('Black T-Shirt')">
            Buy Now
        </button>
    </div>

    <div class="card">
        <h3>Blue Jeans</h3>
        <p>₹999</p>

        <button onclick="orderProduct('Blue Jeans')">
            Buy Now
        </button>
    </div>

    <div class="card" id="shoes">
        <h3>White Shoes</h3>
        <p>₹1499</p>

        <button onclick="orderProduct('White Shoes')">
            Buy Now
        </button>
    </div>

    <div class="card" id="women">
        <h3>Women Fashion</h3>
        <p>₹799</p>

        <button onclick="orderProduct('Women Fashion')">
            Buy Now
        </button>
    </div>

</section>

<section class="contact" id="contact">
    <h2>Contact Us</h2>

    <p>For orders and enquiries, contact us.</p>

    <button onclick="orderProduct('General Enquiry')">
        Contact / Order
    </button>
</section>

<footer>
    © 2026 Abhi Fashion
</footer>

<script>

function searchProducts() {

    let input = document
        .getElementById("search")
        .value
        .toLowerCase();

    let cards = document
        .getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {

        let productName = cards[i]
            .innerText
            .toLowerCase();

        if (productName.includes(input)) {
            cards[i].style.display = "block";
        } else {
            cards[i].style.display = "none";
        }
    }
}

function orderProduct(product) {

    alert("Thank you for your interest in " + product + "!");
}

</script>

</body>
</html>
