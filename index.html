<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhi Fashion</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:#000;
color:#fff;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

nav{
display:flex;
justify-content:center;
gap:20px;
background:#222;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.hero{
text-align:center;
padding:60px 20px;
background:#fff;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:18px;
color:#555;
}

button{
padding:12px 25px;
background:black;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
font-size:22px;
color:red;
font-weight:bold;
}

footer{
background:#000;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}
</style>

</head>
<body>

<header>ABHI FASHION</header>

<nav>
<a href="#">Home</a>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">Shoes</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h1>Welcome to Abhi Fashion</h1>
<p>Latest Fashion Collection at Best Prices</p>
<button>Shop Now</button>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/250x300" alt="">
<h3>Black T-Shirt</h3>
<p class="price">₹499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x300" alt="">
<h3>White Shoes</h3>
<p class="price">₹1499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x300" alt="">
<h3>Blue Jeans</h3>
<p class="price">₹999</p>
<button>Buy Now</button>
</div>

</section>

<footer>
© 2026 Abhi Fashion | All Rights Reserved
</footer>

</body>
</html>
